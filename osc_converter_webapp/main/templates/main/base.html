<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSC Converter WebApp v{{ APP_VERSION }} - {% block title %}Dashboard{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="/static/main/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/main/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container d-flex justify-content-between">
            <a class="navbar-brand text-white" href="{% url 'dashboard' %}">
                <i class="bi bi-broadcast"></i> OSC Converter WebApp v{{ APP_VERSION }}
            </a>
            <button type="button" class="btn btn-outline-light btn-sm" data-bs-toggle="modal" data-bs-target="#aboutModal">
                <i class="bi bi-info-circle"></i>
            </button>
        </div>
    </nav>

    <!-- About Modal -->
    <div class="modal fade" id="aboutModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title w-100 text-center">
                        <i class="bi bi-info-circle"></i> About
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">
                    <h4><i class="bi bi-broadcast"></i> OSC Converter WebApp</h4>
                    <p class="text-muted">Version {{ APP_VERSION }}</p>
                    <hr>
                    <p><strong>Author:</strong> {{ DEVELOPER_NAME }}</p>
                    <p>
                        <i class="bi bi-envelope"></i>
                        <a href="mailto:{{ DEVELOPER_EMAIL }}">{{ DEVELOPER_EMAIL }}</a>
                    </p>
                    <p>
                        <i class="bi bi-github"></i>
                        <a href="{{ DEVELOPER_GITHUB }}" target="_blank">Github Repository</a>
                    </p>
                </div>
                <div class="modal-footer justify-content-center">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Initialize Bootstrap tooltips globally
        document.addEventListener('DOMContentLoaded', function() {
            var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
            tooltipTriggerList.map(function(el) { return new bootstrap.Tooltip(el); });
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
